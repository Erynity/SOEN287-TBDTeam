<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Campus Events logo">
  <defs>
    <clipPath id="rounded"><rect x="7" y="12" width="50" height="44" rx="11"/></clipPath>
  </defs>
  <!-- calendar body + header band, clipped to rounded corners -->
  <g clip-path="url(#rounded)">
    <rect x="7" y="12" width="50" height="44" fill="#D1FAFF"/>
    <rect x="7" y="12" width="50" height="15" fill="#9BD1E5"/>
  </g>
  <!-- binder rings -->
  <rect x="20" y="7" width="5" height="12" rx="2.5" fill="#6A8EAE"/>
  <rect x="39" y="7" width="5" height="12" rx="2.5" fill="#6A8EAE"/>
  <!-- check mark = "you're registered / it's planned" -->
  <path d="M22 40 l7 7 l14 -15" fill="none" stroke="#6A8EAE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
