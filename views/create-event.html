<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ==========================================================
       PAGE TEMPLATE - Smart Campus Event Planner (SOEN 287)

       HOW TO USE:
       1. Copy this file, rename it (e.g. events.html).
       2. Change the <title> below.
       3. In the nav, move class="active" to YOUR page's link.
       4. Build your page inside <main>. Use classes from
          /public/css/style.css (cards, buttons, forms, tables).
       5. Do NOT edit the navbar structure or the stylesheet
          without telling the group.
       ========================================================== -->
  <meta charset="UTF-8">
  <!-- viewport tag = required for responsive design on phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Create Event - Smart Campus Event Planner</title>

  <!-- Shared font + stylesheet. Path is relative to /views/. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../public/css/style.css">
  <link rel="icon" href="../public/images/favicon.svg" type="image/svg+xml">
</head>

<body>

  <!-- ================= NAVBAR (same on every page) ============
       During Deliverable 1 we show ALL links so the prof can
       navigate everything. In Deliverable 2, the backend will
       decide which links to show based on who is logged in.  -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="../index.html">
        <img src="../public/images/logo.svg" alt="" width="28" height="28"
          style="vertical-align:middle; margin-right:6px;">
        Campus Events
      </a>
      <ul class="navbar-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="student-dashboard.html">Student</a></li>
        <li><a href="my-registrations.html">My Registrations</a></li>
        <li><a href="admin-dashboard.html">Admin</a></li>
        <li><a href="contact.html">About</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a class="btn" href="register.html" style="padding:0.3rem 0.9rem;">Sign up</a></li>
      </ul>
    </div>
  </nav>

  <!-- ================= YOUR PAGE CONTENT ====================== -->
  <main>

    <span class="eyebrow">Event management</span>
    <h1>Creating event </h1>
    <p class="muted">Fill in the details to create a new event.</p>
    <form action="/create-event" method="POST">
      <label for="event-name">Event Title:</label>
      <input type="text" id="event-name" name="event-name" placeholder="Give your event a title" required>


      <label for="event-category">Event Category:</label>
      <select id="event-category" name="event-category" required>
        <option value="">Select the event category</option>
        <option value="academic-workshop">Academic workshops</option>
        <option value="career-events">Career events</option>
        <option value="club-activities">Club activities</option>
        <option value="sports-events">Sports events</option>
        <option value="cultural-events">Cultural events</option>
        <option value="volunteering-events">Volunteering events</option>
        <option value="social-events">Social events</option>
        <option value="guest-lectures">Guest lectures</option>
        <option value="networking-events">Networking events</option>
        <option value="other">Other</option>
      </select>

      <label for="other-category">If "Other", please specify:</label>
      <input type="text" id="other-category" name="other-category" placeholder="e.g., Hackathon, Seminar, etc.">

      <label for="event-date">Event Date:</label>
      <input type="date" id="event-date" name="event-date" required>

      <label for="start-time">Start Time:</label>
      <input type="time" id="start-time" name="start-time" required>

      <label for="end-time">End Time:</label>
      <input type="time" id="end-time" name="end-time" required>

      <label for="event-location">Event Location:</label>
      <input type="text" id="event-location" name="event-location" required>

      <label for="capacity">Maximum number of participants:</label>
      <input type="number" id="capacity" name="capacity" min="1" placeholder="e.g., 50" required>

      <label for="event-description">Event Description:</label>
      <textarea id="event-description" name="event-description" rows="4"
        placeholder="Enter a brief description of the event to help participants understand what to expect."
        required></textarea>

      <button class="btn" type="submit">Create Event</button>

    </form>

  </main>

  <!-- ================= FOOTER (same on every page) ============ -->
  <footer class="footer">
    Smart Campus Event Planner · SOEN 287 Summer 2026 · Team 13
  </footer>

</body>

</html>
