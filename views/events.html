<!DOCTYPE html>

  <!-- ==========================================================
       PAGE TEMPLATE - Smart Campus Event Planner (SOEN 287)

       HOW TO USE:
       1. Copy this file, rename it (e.g. events.html).
       2. Change the <title> below.
       3. In the nav, move class="active" to YOUR page's link.

          /public/css/style.css (cards, buttons, forms, tables).
       5. Do NOT edit the navbar structure or the stylesheet
          without telling the group.
       ========================================================== -->
  <meta charset="UTF-8">
  <!-- viewport tag = required for responsive design on phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Events - Smart Campus Event Planner</title>

  <!-- Shared font + stylesheet. Path is relative to /views/. -->

  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../public/css/style.css">
  <link rel="icon" href="../public/images/favicon.svg" type="image/svg+xml">
  <script src="../public/js/main.js" defer></script>
  
</head>

<body data-back="auto">

  <!-- ================= NAVBAR (same on every page) ============
       During Deliverable 1 we show ALL links so the prof can
       navigate everything. In Deliverable 2, the backend will
       decide which links to show based on who is logged in.  -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="../index.html">
        <img src="../public/images/logo.svg" alt="" width="28" height="28"
          style="vertical-align:middle; margin-right:6px;">
        Campus Events
      </a>
      
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>

      <ul class="navbar-links">
        <li><a href="../index.html">Home</a></li>
        <li><a class="active" href="events.html">Events</a></li>
        <li><a href="student-dashboard.html">Student</a></li>

      </ul>
    </div>
  </nav>

  <!-- ================= YOUR PAGE CONTENT ====================== -->
  <main>


    <span class="eyebrow">Events</span>
    <h1>Every Event in one place</h1>

    <!--filters and search function
        filters for category, date, location and organizer
        FINISH PLUGGING IT IN WITH JS-->
    <div class="filters">
      <input type="text" id="searchInput" placeholder="Search events...">

      <select id="categoryFilter">
          <option value="">All Categories</option>
          <option>Academic workshops</option>
          <option>Career events</option>
          <option>Club activities</option>
          <option>Sports events</option>
          <option>Cultural events</option>
          <option>Volunteering events</option>
          <option>Social events</option>
          <option>Guest lectures</option>
          <option>Networking events</option>
          <option>Other</option>
      </select>

      <select id="organizerFilter">
          <option value="">All Organizers</option>
      </select>

      <select id="statusFilter">
          <option value="">All Statuses</option>
          <option>Open</option>
          <option>Full</option>
          <option>Cancelled</option>
          <option>Completed</option>
      </select>
    </div>

    <div class="grid" id="EVENT_GRID"></div>

    <!--events populated by js in main.js-->
    <div class="grid" id="EVENT_GRID"></div>


  </main>



  <!-- ================= FOOTER (same on every page) ============ -->
  <footer class="footer">
    Smart Campus Event Planner · SOEN 287 Summer 2026 · Team 13
  </footer>
